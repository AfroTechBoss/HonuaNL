<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Honua · Desktop prototype</title>
<link rel="stylesheet" href="../src/styles.css">
<style>
  html, body { height: 100%; background: #e9e8e2; }
  #root { height: 100vh; }

  .proto-chrome {
    height: 48px; flex-shrink: 0;
    background: #efeee8;
    border-bottom: 1px solid var(--line);
    display: flex; align-items: center; gap: 10px;
    padding: 0 16px;
  }
  .proto-dot { width: 12px; height: 12px; border-radius: 50%; }
  .proto-navbtn {
    width: 28px; height: 28px; border-radius: 8px;
    background: transparent; border: none; cursor: pointer;
    color: var(--ink-2); display: grid; place-items: center;
  }
  .proto-navbtn:hover:not(:disabled) { background: rgba(0,0,0,.06); }
  .proto-navbtn:disabled { color: var(--ink-4); opacity: .4; cursor: default; }
  .proto-url {
    flex: 1; max-width: 560px; margin: 0 4px;
    background: #fff; border: 1px solid var(--line);
    border-radius: 9px; height: 30px;
    display: flex; align-items: center; gap: 6px;
    padding: 0 14px;
    font-family: 'Geist Mono', monospace; font-size: 12.5px;
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- shared components, then post card / mock data -->
<script type="text/babel" src="../src/components/shared.jsx"></script>
<script type="text/babel" src="../src/components/post-card.jsx"></script>
<script type="text/babel" src="../src/components/seller-data.jsx"></script>
<script type="text/babel" src="../src/components/admin-data.jsx"></script>

<!-- desktop screens -->
<script type="text/babel" src="../src/components/desktop-home.jsx"></script>
<script type="text/babel" src="../src/components/desktop-impact.jsx"></script>
<script type="text/babel" src="../src/components/desktop-map-carbon.jsx"></script>
<script type="text/babel" src="../src/components/desktop-profile.jsx"></script>
<script type="text/babel" src="../src/components/desktop-misc.jsx"></script>
<script type="text/babel" src="../src/components/desktop-rest.jsx"></script>

<!-- seller flow: apply, admin approvals, seller dashboard -->
<script type="text/babel" src="../src/components/desktop-seller.jsx"></script>
<script type="text/babel" src="../src/components/desktop-seller-dash.jsx"></script>

<!-- admin console -->
<script type="text/babel" src="../src/components/desktop-admin.jsx"></script>
<script type="text/babel" src="../src/components/desktop-admin-manage.jsx"></script>

<!-- prototype shell -->
<script type="text/babel" src="../src/proto-desktop.jsx"></script>
</body>
</html>
