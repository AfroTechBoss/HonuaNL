<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Honua · Mobile prototype</title>
<link rel="stylesheet" href="../src/styles.css">
<style>
  html, body { height: 100%; }
  #root { height: 100vh; }

  .mob-stage {
    height: 100vh; width: 100%;
    display: grid; place-items: center;
    background:
      radial-gradient(900px 600px at 50% -10%, #ecf5ee 0%, transparent 60%),
      #e9e8e2;
    position: relative; overflow: hidden;
  }
  .mob-phone-wrap { transform-origin: center center; }

  /* Full-bleed app for real phones — no bezel, fills the viewport */
  .mob-stage.fullbleed { display: block; background: var(--bg); }
  .mob-fullbleed {
    position: relative;
    width: 100vw; height: 100vh; height: 100dvh;
    overflow: hidden; background: var(--bg);
  }
  .mob-fullbleed .phone-status { padding-top: 12px; }

  /* Cheap per-screen crossfade (opacity only — no layout/filter cost) */
  .mob-screen-fade { animation: mobScreenFade .16s ease; }
  @keyframes mobScreenFade {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  @media (prefers-reduced-motion: reduce) { .mob-screen-fade { animation: none; } }

  /* Floating jump button */
  .mob-jump {
    position: fixed; bottom: 28px; right: 28px; z-index: 100;
    width: 52px; height: 52px; border-radius: 16px;
    background: var(--ink); color: #fff; border: none; cursor: pointer;
    display: grid; place-items: center;
    box-shadow: 0 14px 34px -10px rgba(0,0,0,.45);
    transition: transform .15s;
  }
  .mob-jump:hover { transform: translateY(-2px); }

  .mob-scrim {
    position: fixed; inset: 0; z-index: 90;
    background: rgba(10,13,11,.32);
  }
  .mob-menu {
    position: fixed; bottom: 92px; right: 28px; z-index: 100;
    width: 256px; max-height: 70vh; overflow: auto;
    background: var(--surface); border: 1px solid var(--line);
    border-radius: 18px; padding: 14px;
    box-shadow: 0 24px 60px -18px rgba(0,0,0,.4);
  }
  .mob-menu-head { padding: 2px 6px 12px; border-bottom: 1px solid var(--line); margin-bottom: 8px; }
  .mob-menu-group {
    font-family: 'Geist Mono', monospace; font-size: 10px;
    letter-spacing: .08em; color: var(--ink-4);
    padding: 8px 6px 4px;
  }
  .mob-menu-item {
    display: flex; align-items: center; justify-content: space-between;
    width: 100%; padding: 9px 10px; border-radius: 10px;
    background: transparent; border: none; cursor: pointer;
    font-family: 'Geist', sans-serif; font-size: 14px; font-weight: 500;
    color: var(--ink-2); margin-bottom: 1px;
  }
  .mob-menu-item:hover { background: var(--bg-2); }
  .mob-menu-item.active { background: var(--green-tint); color: var(--green); font-weight: 600; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- shared components, then post card / mock data -->
<script type="text/babel" src="components/shared.jsx"></script>
<script type="text/babel" src="components/post-card.jsx"></script>
<script type="text/babel" src="components/seller-data.jsx"></script>
<script type="text/babel" src="components/admin-data.jsx"></script>

<!-- mobile screens -->
<script type="text/babel" src="components/mobile-screens.jsx"></script>
<script type="text/babel" src="components/mobile-screens2.jsx"></script>
<script type="text/babel" src="components/mobile-screens3.jsx"></script>

<!-- seller flow: apply, admin approvals, seller dashboard -->
<script type="text/babel" src="components/mobile-seller.jsx"></script>
<script type="text/babel" src="components/mobile-seller-dash.jsx"></script>

<!-- admin console -->
<script type="text/babel" src="components/mobile-admin.jsx"></script>

<!-- prototype shell -->
<script type="text/babel" src="proto-mobile.jsx"></script>
</body>
</html>
